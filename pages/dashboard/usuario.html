<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Usuario</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body class="role-user">
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo-izquierda">
                <a href="../landing.html">
                    <img src="../../img/sport7.png" alt="Logo de la empresa" class="logo-img">
                </a>
            </div>
            <div class="logo_placeholder"></div>
            <nav class="main-nav">
                <a href="../landing.html" class="nav-item">Inicio</a> 
                <a href="#" class="nav-item">Clases</a>
                <a href="#" class="nav-item">Reservas</a>
                <a href="#" class="nav-item">Mi Progreso</a>
            </nav>
            <div class="header-actions">
                <button class="btn btn-outline">Editar Perfil</button>
                <button id="btn-cerrar-sesion" class="btn btn-solid">Cerrar Sesión</button>
            </div>
        </div>
    </header>
    <main class="container">
        <section class="dashboard-section">
            <h1 style="margin-bottom: 25px;">Mi Perfil</h1>
            <div class="grid-layout">
                <div class="card" style="display:flex; flex-direction:column; align-items:center; gap:18px;">
                    <img src="../../img/Animacion.jpeg" class="avatar" alt="Foto de Perfil" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; box-shadow:0 2px 8px #0001;">
                    <div style="text-align:center;">
                        <h2 id="display-nombre" style="margin-bottom:4px;">Cargando...</h2>
                        <span id="display-rol" style="font-size:13px; opacity:0.8;">Cargando rol...</span>
                        <p style="margin-top:10px; font-size:14px;">Miembro desde: <b>12/05/2024</b></p>
                        <p id="display-email" style="font-size:14px;">Email: cargando...</p>
                    </div>
                </div>
                <div class="card card-full">
                    <h3>Información Personal</h3>
                    <form id="form-info" style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
                        <div style="display:flex; flex-direction:column;">
                            <label for="nombre">Nombre completo</label>
                            <input type="text" id="nombre" value="" style="padding:7px; border-radius:6px; border:1px solid #ccc;">
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <label for="email">Email</label>
                            <input type="email" id="email" value="" style="padding:7px; border-radius:6px; border:1px solid #ccc;">
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <label for="fecha">Fecha de nacimiento</label>
                            <input type="date" id="fecha" value="2000-01-01" style="padding:7px; border-radius:6px; border:1px solid #ccc;">
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <label for="deporte">Deporte favorito</label>
                            <input type="text" id="deporte" value="Fútbol" style="padding:7px; border-radius:6px; border:1px solid #ccc;">
                        </div>
                        <div style="grid-column:1/3; display:flex; flex-direction:column;">
                            <label for="intereses">Intereses / Metas</label>
                            <textarea id="intereses" rows="2" style="padding:7px; border-radius:6px; border:1px solid #ccc;">Me interesa el atletismo y la nutrición deportiva.</textarea>
                        </div>
                        <div style="grid-column:1/3; text-align:right;">
                            <button class="btn btn-solid" type="submit">Guardar cambios</button>
                        </div>
                    </form>
                </div>
                <div class="card card-full">
                    <h3>Cambiar Contraseña</h3>
                    <form id="form-pass" style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
                        <div style="display:flex; flex-direction:column;">
                            <label for="pass-actual">Contraseña actual</label>
                            <input type="password" id="pass-actual" style="padding:7px; border-radius:6px; border:1px solid #ccc;" required>
                        </div>
                        <div style="display:flex; flex-direction:column;">
                            <label for="pass-nueva">Contraseña nueva</label>
                            <input type="password" id="pass-nueva" style="padding:7px; border-radius:6px; border:1px solid #ccc;" required>
                        </div>
                        <div style="grid-column:1/3; text-align:right;">
                            <button class="btn btn-solid" type="submit">Actualizar contraseña</button>
                        </div>
                    </form>
                </div>
                <div class="card card-full">
                    <h3>Clases Disponibles</h3>
                    <table class="data-table">
                        <tr><th>Clase</th><th>Horario</th><th></th></tr>
                        <tr><td>Spinning</td><td>Lunes 18:00</td><td><button class="btn-action">Reservar</button></td></tr>
                        <tr><td>CrossFit</td><td>Miércoles 10:00</td><td><button class="btn-action">Reservar</button></td></tr>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <script src="../../js/cargar.js"></script>
</body>
</html>
