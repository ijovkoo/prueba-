<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Tarea Programación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cuerpo-pagina">

    <div class="contenedor-centrado-pantalla">
        
        <div class="cuadro-formulario-card">
            
            <h1>Recuperar Contraseña</h1>
            <p style="text-align: center; color: #666; margin-bottom: 20px;">
                Introduce tu correo electrónico para enviarte las instrucciones de restablecimiento.
            </p>

            <div class="logo-centrado">
                <img src="ab.jpg" alt="Logo de la empresa">
            </div>

            <form action="#" class="formulario-recuperar">
                
                <div class="grupo-input">
                    <label>Correo Electrónico:</label>
                    <input type="email" class="input-correo" placeholder="ejemplo@correo.cl" required>
                </div>

                <button type="submit" class="boton-inicio-sesion">Enviar Instrucciones</button>
            </form>

            <div class="seccion-links">
                <a href="login.html" class="link-registrarse">Volver al Inicio de Sesión</a>
            </div>

        </div>
    </div>

</body>
</html>
